# Публикация сайта на GitHub Pages.
# При каждом пуше пересобирает список альбомов из содержимого папки img
# и выкладывает сайт. Никаких ручных правок в коде не требуется.
#
# Включается один раз: Settings -> Pages -> Source: GitHub Actions

name: Публикация сайта

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Собрать список альбомов из папки img
        run: python3 tools/build_albums.py

      - name: Подготовить файлы к публикации
        run: |
          mkdir -p _site
          rsync -a \
            --exclude '_site/' \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'api/' \
            --exclude 'tools/' \
            --exclude '*.md' \
            --exclude '*.sh' \
            --exclude '*.bat' \
            --exclude '.htaccess' \
            --exclude 'title.txt' \
            --exclude 'README.txt' \
            ./ _site/
          touch _site/.nojekyll

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
